<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>QR Generator</title>

  <style>
    body {
      background: #111;
      color: white;
    }

    .custom-navbar {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      padding: 12px 0;
    }

    .navbar-brand {
      font-size: 22px;
      font-weight: bold;
      color: #fff !important;
    }

    .nav-link {
      color: #ccc !important;
      margin: 0 10px;
    }

    .nav-link:hover {
      color: #fff !important;
    }

    .btn-custom {
      background: linear-gradient(45deg, #0d6efd, #6610f2);
      border: none;
      color: white;
      border-radius: 20px;
      padding: 6px 15px;
    }

    #qr-section {
      margin-top: 80px;
    }

    input {
      border-radius: 20px !important;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg custom-navbar">
  <div class="container">
    
    <a class="navbar-brand" href="/">QR App</a>

    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      ☰
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="/">Home</a>
        </li>
      </ul>

      <a href="#qr-section" class="btn btn-custom">Generate QR</a>
    </div>
  </div>
</nav>

<!-- QR SECTION -->
<div id="qr-section" class="container text-center">
  <h2 class="mb-4">Generate QR Code</h2>

  <!-- URL input -->
  <input type="text" id="qrText" placeholder="Enter URL or text" class="form-control w-50 mx-auto my-3">

  <!-- FILE NAME INPUT -->
  <input type="text" id="fileName" placeholder="Enter file name (optional)" class="form-control w-50 mx-auto my-2">

  <!-- Generate button -->
  <button onclick="generateQR()" class="btn btn-primary mt-2">Generate</button>
  <div class="mt-3">
  <a id="downloadBtn" class="btn btn-success" style="display:none;">Download QR</a>
  
  <!--Transparent Button -->
  <a id="transparentBtn" class="btn btn-warning" style="display:none;">
    Download Transparent QR
  </a>
</div>

  <!-- QR image -->
  <div class="mt-4">
    <img id="qrImage" style="display:none; width:200px;">
  </div>

  <!-- Download button -->
  <div class="mt-3">
    <a id="downloadBtn" class="btn btn-success" style="display:none;">Download QR</a>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function generateQR() {
  const url = document.getElementById("qrText").value;
  const filename = document.getElementById("fileName").value || "qr_code";

  if (!url) {
    alert("Enter URL");
    return;
  }

  const qrImage = document.getElementById("qrImage");
  const downloadBtn = document.getElementById("downloadBtn");
  const transparentBtn = document.getElementById("transparentBtn");

  const normalUrl = `/generate_qr?url=${encodeURIComponent(url)}&t=${Date.now()}`;
  const transparentUrl = `/generate_qr?url=${encodeURIComponent(url)}&transparent=true&t=${Date.now()}`;

  qrImage.onload = () => {
    qrImage.style.display = "block";

    // Normal download
    downloadBtn.href = normalUrl;
    downloadBtn.download = filename + ".png";
    downloadBtn.style.display = "inline-block";

    // Transparent download
    transparentBtn.href = transparentUrl;
    transparentBtn.download = filename + "_transparent.png";
    transparentBtn.style.display = "inline-block";
  };

  qrImage.src = normalUrl;
}
</script>
</body>
</html>
